<!doctype html>
<html lang="nl"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Operatie Oude Eik – Speler (v4.1)</title>
<script src="/socket.io/socket.io.js"></script>
<link rel="stylesheet" href="/theme.css"/>
<style>
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--ink)}
header{padding:18px 16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg, rgba(90,45,255,.08), rgba(26,163,122,.07));}
.wrap{max-width:1120px;margin:0 auto;padding:16px}
h1{margin:0;font-size:18px}
.sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.4}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input{padding:12px;border-radius:14px;border:1px solid var(--border);outline:none;font-size:14px;background:#fff}
button{padding:12px 14px;border-radius:14px;border:1px solid var(--border);background:#fff;font-weight:900;cursor:pointer}
button:hover{border-color:#cfd6ea}
.pill{display:inline-flex;gap:8px;align-items:center;padding:7px 10px;border-radius:999px;border:1px solid var(--border);font-size:12px;color:var(--muted);background:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.roles{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:720px){.roles{grid-template-columns:1fr}}
.role{border:1px solid var(--border);border-radius:18px;padding:12px;cursor:pointer;background:#fff;display:flex;gap:12px;align-items:flex-start;transition:.12s}
.role:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#d4dcf2}
.role .name{display:flex;justify-content:space-between;gap:10px;align-items:center;font-weight:950}
.role .desc{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.35}
.avatarBox{width:54px;height:54px;border-radius:18px;border:1px solid var(--border);background:linear-gradient(135deg, rgba(90,45,255,.08), rgba(26,163,122,.06));display:grid;place-items:center;overflow:hidden}
.avatarBox img{width:40px;height:40px}
.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
@media(max-width:720px){.choices{grid-template-columns:1fr}}
.opt{border:1px solid var(--border);border-radius:18px;padding:12px;background:#fff;cursor:pointer;transition:.12s}
.opt:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#d4dcf2}
.opt .k{font-weight:950}
.opt .s{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.35}
.hero{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.heroLeft{display:flex;gap:12px;align-items:center}
.heroIcon{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg, rgba(90,45,255,.92), rgba(26,163,122,.86));box-shadow:var(--shadow);display:grid;place-items:center;color:#fff;font-weight:950}
.imgWrap{margin-top:12px;border:1px solid var(--border);border-radius:18px;overflow:hidden;background:#fff}
.imgWrap img{width:100%;display:block}
.smallcap{padding:10px 12px;color:var(--muted);font-size:12px;line-height:1.35;border-top:1px solid var(--border)}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;background:#111827;color:#fff;padding:10px 12px;border-radius:12px;opacity:0;transition:.2s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
</style></head>
<body class="bgPattern">
<header>
  <div class="wrap">
    <div class="hero">
      <div class="heroLeft">
        <div class="heroIcon">OE</div>
        <div>
          <h1>Operatie Oude Eik – Multiplayer</h1>
          <div class="sub">Join met roomcode, kies je rol, en maak per ronde één A/B/C keuze. Facilitator zit op <b>/facilitator</b>.</div>
        </div>
      </div>
      <div class="brandBar" style="min-width:340px">
        <div class="left">
          <img src="/assets/logo_go.svg" alt="G&O" height="34"/>
          <img src="/assets/logo_eco.svg" alt="Ecoresult" height="34"/>
        </div>
        <span class="badge">⚡ Innovatie</span>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="card" style="padding:14px;margin-bottom:12px">
    <div class="row">
      <input id="room" placeholder="Roomcode (bijv. A7K3P)" style="width:180px;text-transform:uppercase"/>
      <button id="join" class="btnPrimary">Join</button>
      <input id="team" placeholder="Teamnaam (bijv. Team Noord)" style="flex:1;min-width:240px"/>
    </div>
    <div class="row" style="margin-top:10px">
      <span class="pill" id="roomPill">Room: —</span>
      <span class="pill">Rol: <b id="rolePill">—</b></span>
      <span class="pill">Score: <b id="score">0</b></span>
      <span class="pill">Risico: <b id="risk">0</b></span>
    </div>
  </div>

  <div class="grid">
    <div class="card" style="padding:14px">
      <div style="font-weight:950;margin-bottom:10px">1) Kies je rol</div>
      <div class="roles" id="roles"></div>
      <div class="sub" style="margin-top:10px">Tip: spreek af wie welke rol pakt. Je teamnaam verschijnt bij de facilitator.</div>
    </div>

    <div class="card" id="roundCard" style="padding:14px;display:none">
      <div style="font-weight:950" id="roundTitle">—</div>
      <div class="sub" id="roundPrompt">—</div>

      <div class="imgWrap" id="imgBox" style="display:none">
        <img id="roundImg" alt="Ronde visual"/>
        <div class="smallcap" id="imgCap">—</div>
      </div>

      <div style="font-weight:950;margin-top:12px">2) Kies A / B / C</div>
      <div class="choices" id="choices"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const socket=io(); const $=(id)=>document.getElementById(id);
let roomId=null, role=null, state=null;
const meta={
 "G&O":{m:"/assets/mascot_go.svg",desc:"Opdrachtgever: scope, planning, bewoners, budget."},
 "Ecoresult":{m:"/assets/mascot_eco.svg",desc:"Adviesbureau: onderzoek, vergunning, mitigatie."},
 "IkWilNietMeewerken":{m:"/assets/mascot_gov.svg",desc:"Bevoegd gezag: eisen, termijnen, volledigheid."},
 "Beunhaas":{m:"/assets/mascot_con.svg",desc:"Aannemer: uitvoering, startdatum, capaciteit."}
};
function toast(m){const t=$("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1400);}
$("join").onclick=()=>{const code=($("room").value||"").trim().toUpperCase(); if(!code) return toast("Vul roomcode in"); socket.emit("join_room",{roomId:code,asFacilitator:false});};
socket.on("joined",({roomId:rid})=>{roomId=rid; $("roomPill").textContent="Room: "+rid; toast("Verbonden");});
function renderRoles(){
 const wrap=$("roles"); wrap.innerHTML="";
 ["G&O","Ecoresult","IkWilNietMeewerken","Beunhaas"].forEach(r=>{
   const div=document.createElement("div"); div.className="role";
   const taken=state && state.teams && state.teams[r] && state.teams[r].connected;
   div.innerHTML=`
     <div class="avatarBox"><img src="${meta[r].m}" alt="${r}"/></div>
     <div style="flex:1">
       <div class="name"><span>${r}</span><span class="pill">${taken?"Bezet":"Vrij"}</span></div>
       <div class="desc">${meta[r].desc}</div>
     </div>`;
   div.onclick=()=>{
     if(!roomId) return toast("Join eerst");
     const tn=($("team").value||"").trim()||r;
     socket.emit("claim_role",{roomId,roleKey:r,teamName:tn});
     role=r; $("rolePill").textContent=r;
     toast("Rol: "+r);
   };
   wrap.appendChild(div);
 });
}
function submitChoice(k){ if(!roomId||!role) return toast("Kies eerst je rol"); socket.emit("submit_choice",{roomId,roleKey:role,choiceKey:k}); toast("Keuze: "+k); }

socket.on("room_state",(s)=>{
 state=s; $("score").textContent=s.score??0; $("risk").textContent=s.risk??0; renderRoles();
 const rc=$("roundCard");
 if(s.round){
   rc.style.display="block";
   $("roundTitle").textContent=s.round.title;
   $("roundPrompt").textContent=s.round.prompt;

   const imgObj = (s.images && s.images[s.round.id]) ? s.images[s.round.id] : null;
   if(imgObj && imgObj.url){
     $("imgBox").style.display="block";
     $("roundImg").src = imgObj.url;
     $("imgCap").textContent = "Visual (AI) – " + (imgObj.prompt || "");
   } else {
     $("imgBox").style.display="none";
   }

   const ch=$("choices"); ch.innerHTML="";
   if(role && s.round.options && s.round.options[role]){
     s.round.options[role].forEach(opt=>{
       const [k,name,desc]=opt;
       const d=document.createElement("div"); d.className="opt";
       d.innerHTML=`<div class="k">${k}. ${name}</div><div class="s">${desc}</div>`;
       d.onclick=()=>submitChoice(k);
       ch.appendChild(d);
     });
   } else {
     ch.innerHTML='<div class="pill">Kies eerst een rol om opties te zien.</div>';
   }
 } else {
   rc.style.display="block";
   $("roundTitle").textContent="Wachten op facilitator…";
   $("roundPrompt").textContent="De game is nog niet gestart of is afgerond.";
   $("choices").innerHTML="";
   $("imgBox").style.display="none";
 }
});
socket.on("error_msg",(m)=>toast(m));
</script>
</body></html>
